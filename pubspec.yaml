name: muzik_audio_player
description: Music Audio Player.

publish_to: 'none'
version: 0.5.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.20.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  font_awesome_flutter: ^10.8.0
  package_info_plus: ^8.3.0
  device_info_plus: ^11.4.0
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  url_launcher: ^6.3.2

  rxdart: ^0.28.0
  audio_session: ^0.2.1
  just_audio: ^0.10.4
  just_audio_background: ^0.0.1-beta.17

  on_audio_query: ^2.9.0
  on_audio_room: ^2.2.1+1

  marquee: ^2.3.0
  animated_text_kit: ^4.2.3

  objectbox: ^4.0.3
  objectbox_flutter_libs: ^4.0.3

  flutter_launcher_icons: ^0.14.3
  indexed_list_view: ^2.0.1
  permission_handler: ^11.4.0
  page_transition: ^2.2.1

dev_dependencies:
  build_runner: ^2.4.15
  json_serializable: ^6.9.5
  objectbox_generator: ^4.0.3

  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_icons:
  image_path: "assets/app_icon.png"
  android: true
  ios: true

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/app_icon.png
    - assets/cardi_b.jpg
    - assets/icon/artist.png
    - assets/icon/fav_song.png
    - assets/icon/fav_song_r.png
    - assets/icon/file_song.png
    - assets/icon/no_song.png
    - assets/no_cover.png
    - assets/no_cover1.png
    - assets/no_cover2.png
    - assets/no_cover4.png
    - assets/passenger-let-her-go.jpg
    - assets/playlist_img.png
    - assets/playlist_img1.png

  fonts:
    - family: ubuntu
      fonts:
        - asset: fonts/Ubuntu-Medium.ttf
        - asset: fonts/Ubuntu-MediumItalic.ttf
          style: italic
